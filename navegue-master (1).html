:root{--bg:#0b1220;--card:#1f2937;--accent:#8b5cf6;--text:#e5e7eb;--muted:#9ca3af;--border:#374151;--input:#0f172a}
[data-theme="light"]{--bg:#f1f3f4;--card:#ffffff;--accent:#1a73e8;--text:#202124;--muted:#5f6368;--border:#dadce0;--input:#ffffff}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto;transition:.2s}
header{position:sticky;top:0;background:var(--card);padding:12px 14px;border-bottom:1px solid var(--border);z-index:10}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}h1{margin:0;font-size:20px;display:flex;gap:8px;align-items:center}
.actions{display:flex;gap:8px}.icon-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
.search{display:flex;gap:8px;position:relative}input{flex:1;padding:12px 90px 12px 12px;border-radius:12px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:15px;outline:none}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}
.clear,.mic{position:absolute;top:50%;transform:translateY(-50%);border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center}.clear{right:92px;background:none;color:var(--muted);font-size:20px;display:none;width:28px;height:28px}.mic{right:52px;background:var(--accent);color:#fff;width:36px;height:36px;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.go{padding:12px 16px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;white-space:nowrap}
.tabs{display:flex;gap:8px;padding:10px 14px;overflow:auto;background:var(--bg)} .tab{padding:7px 14px;border-radius:20px;background:var(--card);color:var(--muted);border:1px solid var(--border);font-size:13px;white-space:nowrap;cursor:pointer}.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
main{padding:0 14px 60px;max-width:800px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin:12px 0}
.result-title{font-weight:600;margin-bottom:6px}.result-link{color:var(--accent);text-decoration:none;font-size:13px}
.news{display:flex;gap:12px}.news img{width:90px;height:68px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--bg)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.app{display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;color:var(--text)}.app-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 2px 6px rgba(0,0,0,.15)}.app-label{font-size:11px;opacity:.85;text-align:center;line-height:1.1}
.section{margin:24px 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;opacity:.7;font-weight:700}
.hist{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.hist span{background:var(--card);border:1px solid var(--border);padding:6px 10px;border-radius14px;font-size:12px;cursor:pointer;border-radius:14px}
.games{display:grid;grid-template-columns:1fr 1fr;gap:8px}.game{background:var(--card);border:1px solid var(--border);padding:10px;border-radius:12px;text-decoration:none;color:var(--text);display:flex;gap:8px;align-items:center}
#install{position:fixed;bottom:16px;right:16px;background:var(--accent);color:#fff;border:none;border-radius:24px;padding:12px 18px;font-weight:600;display:none;z-index:20;box-shadow:0 4px12px rgba(0,0,0,.3)}
@media (max-width:360px){.grid{grid-template-columns:repeat(3,1fr)}}
</style>

<header>

    <h1>🌐 Navegue</h1>
    <div class="actions">
      <button class="icon-btn" id="theme" title="Tema">🌙</button>

    </div>
  </div>
  <div class="search">
    <input id="q" placeholder="Pesquisar, falar ou digitar URL..." autocomplete="off" enterkeyhint="search">
    <button class="clear" id="clear">×</button>
    <button class="mic" id="mic" title="Falar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
    <button class="go" id="go">Ir</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-t="web">Buscar</div>
  <div class="tab" data-t="news">Notícias</div>
  <div class="tab" data-t="video">Vídeos</div>
  <div class="tab" data-t="clima">Clima</div>
</div>

<main id="out"></main>
<button id="install">Instalar app</button>

<script>
// ===== TEMA =====
const themeBtn=document.getElementById('theme');
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);themeBtn.textContent=t==='light'?'🌙':'☀️';document.querySelector('meta[name="theme-color"]').content=t==='light'?'#ffffff':'#111827'}
setTheme(localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'));
themeBtn.onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light');

// ===== ELEMENTOS =====
const out=document.getElementById('out'),q=document.getElementById('q'),clear=document.getElementById('clear'),mic=document.getElementById('mic'),go=document.getElementById('go');let tab='web',deferredPrompt;

// Tabs
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');tab=t.dataset.t;if(q.value)buscar()});
go.onclick=buscar; q.onkeydown=e=>e.key==='Enter'&&buscar(); q.oninput=()=>clear.style.display=q.value?'block':'none';
clear.onclick=()=>{q.value='';clear.style.display='none';showHome()};

// Histórico
const saveHist=t=>{let h=JSON.parse(localStorage.getItem('navHist')||'[]');h=[t,...h.filter(x=>x!==t)].slice(0,8);localStorage.setItem('navHist',JSON.stringify(h))};
const getHist=()=>JSON.parse(localStorage.getItem('navHist')||'[]');

// Compartilhar
document.getElementById('share').onclick=()=>navigator.share?navigator.share({title:'Navegue',url:location.href}):navigator.clipboard.writeText(location.href);

// Voz
mic.onclick=()=>{const R=window.SpeechRecognition||window.webkitSpeechRecognition;if(!R)return alert('Microfone não suportado');const r=new R();r.lang='pt-BR';r.onresult=e=>{q.value=e.results[0][0].transcript;buscar()};r.start()};

// Home
function showHome(){
  const hist=getHist().map(h=>`<span onclick="q.value='${h.replace(/'/g,"\'")}';buscar()">${h}</span>`).join('');
  out.innerHTML=`
  ${hist?`<div class="hist">${hist}</div>`:''}

// Busca
async function buscar(){
  let query=q.value.trim();if(!query)return;
  // URL direta?
  if(/^(https?:\/\/|\w+\.\w{2,})/i.test(query)&&!query.includes(' ')){
    if(!/^https?:\/\//i.test(query))query='https://'+query;
    window.open(query,'_blank');return;
  }
  saveHist(query);out.innerHTML='<div class="card">Carregando...</div>';
  try{
    if(tab==='web'){
      let h='';const [ddg,w]=await Promise.all([
        fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`).then(r=>r.json()).catch(()=>null),
        fetch(`https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`).then(r=>r.ok?r.json():null).catch(()=>null)
      ]);
      if(ddg?.AbstractText)h+=`<div class="card"><div class="result-title">${ddg.Heading}</div><div>${ddg.AbstractText}</div></div>`;
      if(w?.extract)h+=`<div class="card"><div class="result-title">${w.title}</div><div>${w.extract}</div><a class="result-link" href="${w.content_urls.desktop.page}" target="_blank">Wikipedia →</a></div>`;
      h+=`<div class="card"><a class="result-link" href="https://www.google.com/search?q=${encodeURIComponent(query)}" target="_blank">Google</a> • <a class="result-link" href="https://duckduckgo.com/?q=${encodeURIComponent(query)}" target="_blank">DuckDuckGo</a></div>`;
      out.innerHTML=h||'<div class="card">Nada encontrado</div>';
    }
    if(tab==='news'){
      const d=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss/search?q='+query+'&hl=pt-BR&gl=BR')}`).then(r=>r.json());
      out.innerHTML=(d.items||[]).slice(0,12).map(i=>`<div class="card news"><img src="${i.thumbnail||''}" onerror="this.remove()"><div><div class="result-title">${i.title}</div><div style="font-size:12px;opacity:.7">${new Date(i.pubDate).toLocaleDateString('pt-BR')}</div><a class="result-link" href="${i.link}" target="_blank">Ler →</a></div></div>`).join('')||'<div class="card">Sem notícias</div>';
    }
    if(tab==='video'){
      out.innerHTML=`<div class="card"><a class="result-link" href="https://m.youtube.com/results?search_query=${encodeURIComponent(query)}" target="_blank">Ver no YouTube →</a></div><div class="card"><a class="result-link" href="https://duckduckgo.com/?q=${encodeURIComponent(query)}&iax=videos&ia=videos" target="_blank">Vídeos (DuckDuckGo) →</a></div>`;
    }
    if(tab==='clima'){
      const g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=pt`).then(r=>r.json());
      if(!g.results){out.innerHTML='<div class="card">Cidade não encontrada</div>';return}
      const {latitude,longitude,name,country}=g.results[0];
      const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=auto`).then(r=>r.json());
      out.innerHTML=`<div class="card"><div class="result-title">${name}, ${country}</div><div style="font-size:28px;font-weight:700">${Math.round(w.current.temperature_2m)}°C</div></div><div class="card"><div class="result-title">Próximos dias</div>${w.daily.time.slice(0,5).map((d,i)=>`<div style="display:flex;justify-content:space-between;padding:4px 0"><span>${new Date(d).toLocaleDateString('pt-BR',{weekday:'short'})}</span><span>${Math.round(w.daily.temperature_2m_min[i])}° / ${Math.round(w.daily.temperature_2m_max[i])}°</span></div>`).join('')}</div>`;
    }
  }catch(e){out.innerHTML='<div class="card">Erro. Tente novamente.</div>'}
}

document.getElementById('install').onclick=async()=>{deferredPrompt.prompt();document.getElementById('install').style.display='none'};
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js'))}

<script>(function(){var loc=location.href.replace(/#.*$/,"");var ATTR_NAMES=["data-product-id","data-productid","data-product_id","product-id","productid","product_id","data-source-entity-id","source-entity-id","source_entity_id","data-product","data-metadata","data-meta"];var DATASET_KEYS=["productId","productid","product_id","sourceEntityId","sourceentityid","source_entity_id","product","metadata","meta"];function readProductId(value){if(typeof value!=="string"||value.length===0)return null;if(/^[0-9]{6,}$/.test(value))return value;var match=value.match(/(?:product(?:_|-)?id|source(?:_|-)?entity(?:_|-)?id)["'=:\s]+([0-9]{6,})/i);return match?match[1]:null}function extractProductId(start){for(var node=start;node&&node!==document.body;node=node.parentElement){for(var i=0;i<ATTR_NAMES.length;i++){var attrValue=node.getAttribute&&node.getAttribute(ATTR_NAMES[i]);var attrProductId=readProductId(attrValue);if(attrProductId)return attrProductId}var dataset=node.dataset||null;if(dataset){for(var j=0;j<DATASET_KEYS.length;j++){var dataValue=dataset[DATASET_KEYS[j]];var dataProductId=readProductId(dataValue);if(dataProductId)return dataProductId}}}return null}document.addEventListener("click",function(e){var target=e.target instanceof Element?e.target:null;if(!target)return;var a=target.closest?target.closest("a[href]"):null;if(!a||!a.href||!/^https?:\/\//.test(a.href))return;if(a.href.replace(/#.*$/,"")===loc)return;var productId=extractProductId(target)||extractProductId(a);if(!productId)return;e.preventDefault();parent.postMessage({type:"ecto-artifact-link-click",productId:productId},"*")},true)})();</script></body>
